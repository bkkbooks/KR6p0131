body:
  text: 瓊樓吟稿序庚子仲春月幾望二林主人從役南還見諸兄子問瓊樓陶氏之疾則已先二旬而逝矣爰以白水一盂梅花一瓣為文而祭之既而檢其遺帙得往歲和豫閉關詩十首豫讀而歎曰異哉此迦陵音也西方佛土七寶林中和鳴哀雅演出念佛念法念僧之聲其在斯乎其在斯乎乃盡發其生平所為詩凡數帙刪而存之得九十餘首仍其舊題曰瓊樓吟稿瓊樓始為詩寓意風花陶情山水吐屬清遠不染塵垢稍長讀聖賢佛祖書漸知刊落詞華鞭迫近裏其有意於古之為己之學者與至十首之作通達法源淨諸疑惑多生根力迸露毫端非猶夫淺智小根所能測識者矣讀瓊樓詩一以為才子一以為高士一以為道人而瓊樓者如空中花如水中月不一不異非我非渠作如是觀謂瓊樓即今長住可也彭紹升序
