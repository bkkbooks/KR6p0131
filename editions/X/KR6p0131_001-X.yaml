body:
  text: 長洲陶善慶餘著海天精舍弟子節鈔松己丑寒風鳴萬壑片月挂東峯烈烈撐天幹森森拔地容寧高君子節肯受大夫封羣木都消瘦虯枝綠轉濃蠟梅時值三冬晚庭前簇淡黃寒風吹不落暖日照還香玉藥千枝吐冰心一點藏翛然空谷裏休擬漢宮妝山茶冒雪飛來幾點霞深深淺淺映窗紗梅公咏罷蘇公咏耐得春寒是蜀茶李花傾城傾國更誰倫曉鏡妝來別有春却笑夭桃千萬樹不於清淡見丰神紫薇曾聞玉殿香飛早不獨樊川色可誇今夜姑蘇明月裏何人更咏紫薇花蓴菜調羮豈必思千里采茆何須溯泮宮一箸絲香三四月題詩原不為秋風茘支白玉為膚蜜作丸何年飛騎進長安邢知一笑成長恨譜出君謨不忍看薑一種園蔬能去惡尼山肉味好同餐須知老辣由天性檜賊聞之膽亦寒將雪風冷天將雪千山朔氣交凍雲初出嶺寒鳥漸歸巢火活茶堪煑詩成句欲敲呼童𢹂帚待窗外墮簷茅題畫扇山迥林遙江水平暮天雲斷數峯橫此中恰有煙霞客落日扁舟一棹輕鸚鵡隴山逸格鬬新妝悞入天涯小玉堂一夢喚回唐社千秋留得漢文章斜樓學語春風細曲檻呼茶曉篆香蕭瑟羈愁何處慰鞦韆影裏落花旁春日幽居庚寅小院饒幽致憑䦨芳草齊春風數歸燕落日一聲雞竹色竹窗北竹香花塢西有誰閒似我漁父釣前溪秋日即事偶步池塘草盡黃一天爽氣午風涼病餘猶厭綿衣薄睡起方知秋日長流水小橋楊柳老白雲深院桂花香隔鄰機杼誰家女辛苦寒窗伴夕陽秋暮蘇臺霜冷雁南歸漠漠黃花弄晚馡暮雨玉樓閒聽笛秋風金翦嬾裁衣庭槐落翠蕭蕭響蝶翅舒黃款款飛最是一年清爽意水深山瘦白雲稀登穹窿山辛卯方外乾坤別山中世界清松根盤石出竹筍帶雲生登天平山山峻千峯立泉深一水通徘徊尋古路小徑落花紅聽泉老鶴唳偏苦孤猿吟更愁何如一條㵎灑落萬山秋自警高齋獨坐時每每警此心惟存一忍耐可以無禍侵既安慎勿貪富貴空勞身天地有消息況爾名利人讀書空山落葉深返照入松樹掃石欲何為讀書聊自娛此中味亦殊日日換佳趣回顧一泠然新月峯尖吐秋晚一天涼氣爽虗幌月來初一二間茅屋兩三卷古書硯池秋露滿竹徑晚香餘淡蕩沙頭鳥鵷鸞定不如冬日即事入冬罷刺繡閒坐擁爐吟松子落寒硯梅花對古琴塵埃消世事冰雪淡予心借問逃禪者真禪何處尋野步壬辰風光眨眼豈長留野外扶笻步步幽曉嶼梅和殘雪落春江雲帶斷冰流數家林壑樵人斧一幅丹青賣酒樓別有閒情何處著非今非古任優游幽居幽居天地新語默任天真花鳥自成友雲山好卜鄰晝眠茅舍暖閒步草橋春不覺空諸慮高懷誰與論秋閨即景三首簾幕動微風新涼入座中一階秋色好明月在梧桐暑退深閨淨涼生團扇秋心清了無事不用說閒愁閨中詩難得如此無病晝永簾垂地香消日影回當階桐子落知是鳥銜來不寐夜久不成寐開軒步小亭長天挂明月秋水浸疎星有得心常樂無螢夢自寧西風知我意卷網放流營登樓晚眺天地竟何窮人生只如此長風吹斷霞西落吳江水古賢今不留誰復省克己回首暮煙橫遠寺鐘聲起同妹靜山夜話癸巳幽居共春寒挑燈為君說人生天地閒何分巧與拙拙者日熈熈巧者百憂結大道本無私白雲自怡悅默然兩忘言人境迥清絕一犬吠深更柴門閉風雪出門何所有出門何所有一派野花香指點虗空畫山山醉夕陽春盡甲午一夜狂風春已盡林花飄泊滿柴關坐臨流水心無住門對青山夢亦閒學道未須參世務修真何必遠人寰卷簾指點峯頭路歷落孤雲手可攀書懷二首錄一擬向尼山更問仁勿由非禮訓曾聞壬辰涵養初除酒丁酉磨礲欲斷葷白雪胸襟消世慮青天眼界識斯文書帷繡幕原無異䇿厲熏修意倍勤慚愧吟三十首有序戊戌長夏閒居俯仰身世捫心自問欲作何等人耶今為女流無以振拔身心仍流浪于生死其為後身將不可問矣危乎危乎幸而真心未泯稍知慚愧意有所觸情見乎詞得七絕若干首釋經云人無慚者與諸禽獸無相異也道經云為此慙愧不離心中孔子云行己有恥亦慙愧義耳夫三教聖賢度人度己皆不外乎慚愧以為基庶民去之君子存之在此間而已篇章有盡慚愧無窮因命曰慙愧吟慚愧前生德未修報身五障有因由然而幸得人身在豈可還嫌是女流三牲五鼎亦非奇慚愧如何說孝思幸得人身在天地報恩何必盡男兒哀哀父母大劬勞正法心傳豈易遭指點提撕終未契自憐慙愧作兒曹親恩天地本相同慙愧吾生道未充只要自心明徹了四恩圓滿證真空晨興每過日高時拂鏡開簾倩侍兒湯水殷勤代梳沐此身慙愧坐如尸夜眠最喜小棕牀潔淨何須雜異香慙愧睡魔消不得還憑夢裏主人強烏啼日落乞人愁露坐長林溪水頭慙愧吾居安樂國好生知足在勤修當暑輕綃又薄羅冬來翠被暖如何自然供養難消受慙愧何曾學一梭比鄰亦有歎無衣圭竇寒衝雨雪霏慙愧吾無萬箱帛盡教暖氣入柴扉貧家升合猶艱辦慙愧呼庚泣路隅安得摩尼如意寶空中遍雨米如珠百糓諸英及果蔬種成人用苦工夫吾今慙愧虗充腹知得尼山味字無三教經書滿天地阿誰認得路頭真童顏皓首都慙愧出世原須世上人仁是人心語意深時誇辭藝失真心覓心慙愧無從覓擬向顏回問處尋戒定始能生智慧等閒慙愧說多能伐毛洗髓緣何事悟後矜誇也未應堅強念力好修行慙愧偏多懦弱情寧可髑髏俱粉碎無生法忍誓終成執虗如滿心方斂恭敬亦從智慧來慙愧起居常自懈既知悔悟勉之哉博施濟眾堯猶病立達何曾與世違慙愧不妨時在念聖人原是學人師身根清淨元非易慙愧先離殺盜邪三業因緣最微細直教觸處不生芽識透舉心即錯處意根清淨反真源須知萬法皆非法慙愧無端又贅言六根清淨乃為佳鹿鹿風人漫與儕慙愧在心無所戀白雲修竹寫幽懷相將遊屐百花芳雅集琴棋泛夜光慙愧在心何所事閒窗淨几不添香急須打破利名關紫綬黃金亦等閒慙愧在心無所慕清風朗月坐空山真修人自要安貧人不安貧便亂真慙愧在心無所苦由來學道本艱辛世緣少著即消愆拂逆頻來意自便慙愧在心無所怒任從熱鐵頂頭旋世態偏憂無事時損之又損絕人知近來識得損之妙慙愧亡羊歎路岐閨閣風流脂粉妝綺羅染得麝蘭香吾心慙愧難從眾椎髻青衫學孟光哀哀生命苦烹炮血染刀砧日作肴慙愧不能相救護冤魂何處肯離拋忍辱仙人大布施挑睛苦行欲誰知而今悲願無邊量慙愧虗勞金手垂虗垂金手不知疲慈覆人天遇者稀最是此生慙愧處未同大眾盡歸依憍曇彌願廣無邊度盡閻浮婦女緣慙愧夙生多障業輸他靈照悟機先和二林主人戊戌春日閉關作十首即次原韻己亥無相光中自有真慈風披拂四時春而今一著通消息回向蓮稽首頻原來無實亦無虗論道談禪事也餘一句彌陀空自性孰為是我孰為渠冰泮春塘波影定照空萬象慧光圓須知行滿功成後鳥語花香也自然亭俯清流屋倚山綠蘿陰裏掩松關閒來好認歸家路免得臨時無處攀淨域神遊明似日杖頭何用夜然藜漫論十萬八千路樓閣虗空更在西行樹何殊七寶林枝頭也得聽靈禽自然說法東風裏演出百千微妙音夙夜惺惺徹底看幾番生滅總無端前村雪後梅花放露出春光不可瞞九十風光易寂寥然燈朗照度春宵烹茶非為清香味適興何妨飲一瓢此土結得蓮社盟八功德水蓮花生一心不亂超凡品定向樂淨處行勘破重關觸處真從今不入舊迷津輪迴六字無終始流水行雲總是春三房孫希洛婦陶氏為葦齊翁孫女好學工詩兼修淨業年二十五而殀詩以傷之香山老人慧業超然自夙成摩尼一串足平生臨岐落落空諸相應向西池證舊盟曾傳咏絮謝家風每愛山居萬籟空慙愧吟成增道力關心不為落花紅著有山居統慚愧吟祭姪婦陶氏文二林主人維乾隆四十五年二月望日二林主人以白水一盂梅花一瓣致祭於姪婦陶氏之靈曰嗚呼是水非色是花非香因緣無主常住寂光瞥爾情生熾然起滅如風度空如春掃雪嗟爾慧業現女人身旃檀晝爇木槵宵輪大報恩經淋漓墨瀋淨願堅牢長趨九品五旬牀簀廿載妝臺達諸法相何去何來無始愛緣從今應斷功德池中花開爛縵羅幃寂寂春漏沈沈我為爾證莫退初心嗚呼尚饗亡妻陶孺人事略陶孺人名善字慶餘蘇州府學歲貢生寄軒公長女也幼聰頴好讀書年十四成百花詩即見賞耆宿性彊記博涉經史諸類書多能背誦侍庭闈婉愉承志曲盡儀節年十六大父為希洛締姻越八年始歸予長予二歲時年二十三矣事吾母甚得歡心與妯娌處無閒言馭婢僕寬嚴合度自奉尤儉樸吾母語親屬曰次媳性情與吾略同吾自是可稍紓心力矣予性素剛躁不能容人及孺人歸遇事輒以寬慈相勸予亦深自克制意氣漸平去年秋試前孺人勸予勤學代理家務予得專心習科舉業及試薦而不售孺人復以義命相慰是時孺人方有娠起居食息每以古人胎教為法臘月初蘊輝生臨蓐甚安孺人謂予曰姑尚無孫得此可慰慈懷矣詎意半月後忽感時邪藥石罔效延及新正竟成永訣悲哉孺人年九歲即喜茹齊稍長從二親聞出世法讀佛書信解通利手書報恩金剛彌陀諸經楷法端整及見予季父所撰無量壽經論居士傳諸書遂回向淨土日有常課晨起妝洗畢輒誦佛號及諸經呪憫吳俗宰割大奢印吳江沈氏所撰慈心寶鑑千本以施嘗著慙愧吟六十首季父評之曰大好根種大好信願努力修行不妨現大家身而為說法其為季父心許如此臨終一月前謂予曰吾與君不過一載因緣耳吾死君勿悲吾恨不能終奉姑君若念吾望慰吾姑并無忘吾父母吾之願也病劇時外舅姑親來診視惟曲為安慰而已臨終朗誦佛號數聲及往生呪曰大和尚自西而來吾去矣遂瞑嗟乎遺挂猶新妝臺忽掩回首前塵真如一夢在孺人夙具慧根去來之際了無滯礙第念予童年失怙顧影自傷今復以喪偶之悲上累北堂重增悒又安能托達人之高論忘獨旦之餘哀乎用是略記始末附於家乘俾後之人有所考云孺人生於乾隆二十一年二月二十二日歿於乾隆四十五年正月二十三日年二十有五子一蘊輝不杖期彭希洛述
